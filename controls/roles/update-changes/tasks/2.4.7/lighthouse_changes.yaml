---
- name: Read service file
  slurp:
    src: "{{ config_file.path }}"
  register: service_configuration_raw

- name: Parse service's configuration
  set_fact:
    service_configuration: "{{ service_configuration_raw['content'] | b64decode | from_yaml }}"
    service_configuration_text: "{{ service_configuration_raw['content'] | b64decode }}"

- name: Lighthouse Changes
  when: service_configuration.service == "LighthouseBeaconService"
  block:
    - name: add --quic-port=9001
      lineinfile:
        path: "{{ config_file.path }}"
        insertafter: "--datadir"
        line: "{{ service_configuration_text | split('\n') | select('match', '^\\s*-\\s.*--datadir.*') | first | split('-') | first }}- --quic-port=9001"
      when: service_configuration.command | select('match', '--quic-port=9001') | length == 0

    - name: add 9001:9001/udp port mapping
      lineinfile:
        path: "{{ config_file.path }}"
        insertafter: "9000/udp"
        line: "{{ service_configuration_text | split('\n') | select('match', '^\\s*-\\s.*9000/udp') | first | split('-') | first }}- 0.0.0.0:9001:9001/udp"
      when: service_configuration.ports | select('search', '9001:9001/udp') | length == 0
